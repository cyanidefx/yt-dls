<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT-DL Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style-dark.css" />
  <link id="themeStylesheet" rel="stylesheet" href="style-light.css">

</head>
<body>
  <div class="container">
    <div class="left-pane">
      <h1>YT-DL Studio</h1>
      <p>yt-dls is a powerful, clean YouTube media downloader powered by yt-dlp. Paste a video link to preview details, select format, and queue downloads with ease. Designed for creators, archivists, and power users.</p>
      <div id="metadata-preview" class="hidden">
        <img id="thumbnail" src="" alt="Video thumbnail" />
        <h3 id="title"></h3>
        <p id="videoDescription"></p>
        <p id="videoSize"></p>
      </div>
    </div>
    <div class="group toggles">
      <label>Dark Mode <input type="checkbox" id="themeToggle" class="switch" /></label>
    </div>
  
    <div class="right-pane">
      <input id="videoUrl" type="text" placeholder="Paste YouTube URL and press Enter" onkeydown="checkEnter(event)" />
      <button onclick="fetchMetadata()">Fetch Metadata</button>
      <div id="shimmer" class="shimmer hidden">Loading...</div>

        <div class="group">
          <label>Video Quality</label>
          <div class="button-row" id="video-quality-buttons"></div>
        </div>

        <div class="group">
          <label>Video Codec</label>
          <div class="button-row" id="video-codec-buttons"></div>
        </div>

        <div class="group">
          <label>Audio Bitrate</label>
          <div class="button-row" id="audio-bitrate-buttons"></div>
        </div>
        
      <div class="group checkbox-group">
        <label><input type="checkbox" id="audioOnlyToggle" /> Audio Only</label>
      </div>

      <div class="group toggles">
        <label>Prefer HLS <input type="checkbox" id="preferHLS" class="switch" /></label>
        <label>Allow H265 <input type="checkbox" id="allowH265" class="switch" /></label>
        <label>Convert to GIF <input type="checkbox" id="convertGIF" class="switch" /></label>
      </div>
      <button onclick="queueDownload()">Add to Queue</button>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
