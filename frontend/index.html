<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT-DL Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="topbar">
    <div class="logo">YT-DL Studio</div>
  </nav>  
  <div class="container">
    <div class="split">

      <!-- LEFT PANEL -->
      <div class="left">
        <h1>YT-DL Studio</h1>
        <p>
          <strong>yt-dls</strong> is a powerful media downloader powered by yt-dlp.<br />
        </p>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right">
        <input
          id="url"
          type="text"
          placeholder="Paste YouTube URL and press Enter"
          oninput="checkURL()"
          onkeydown="checkEnter(event)"
        />
        <button id="fetchBtn" onclick="fetchMetadata()">Fetch Metadata</button>
        <div id="loader" class="hidden"></div>

        <div id="meta" class="hidden">
          <img id="thumb" alt="Video thumbnail" />
          <div id="shimmer" class="shimmer hidden"></div>
          <h2 id="title">Video Title</h2>

          <label for="format">Select Format</label>
          <select id="format" disabled></select>

          <label>
            <input type="checkbox" id="audio_only" disabled onchange="toggleAudioFormat()" />
            Audio Only
          </label>

          <label for="audio_format">Audio Format</label>
          <select id="audio_format" disabled>
            <option value="mp3">MP3</option>
            <option value="m4a">M4A</option>
            <option value="ogg">OGG</option>
          </select>

          <button id="downloadBtn" onclick="queueDownload()" disabled>
            Add to Queue
          </button>
        </div>

        <ul id="queue"></ul>
      </div>

    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
